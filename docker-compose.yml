version: '3.9'

services:
  db:
    image: postgres:16
    container_name: career-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: careerdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: career-adminer
    restart: unless-stopped
    ports:
      - "8090:8080"
    depends_on:
      - db

volumes:
  postgres_data:
